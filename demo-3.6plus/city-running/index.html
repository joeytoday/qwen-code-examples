<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Running - 城市跑步</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#87ceeb;font-family:'Helvetica Neue',Arial,sans-serif}
        #canvas-container{width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:1}
        #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;display:none}
        
        #score-panel{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px 18px;backdrop-filter:blur(6px)}
        #score-panel h3{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
        #score-value{color:#222;font-size:36px;font-weight:700}
        
        #speed-panel{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px 18px;backdrop-filter:blur(6px)}
        #speed-panel h3{color:#666;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
        #speed-value{color:#222;font-size:32px;font-weight:700}
        #speed-unit{color:#888;font-size:12px;margin-left:3px}
        
        #jump-hint{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);color:#555;font-size:13px;font-weight:600;opacity:0.7;transition:opacity 0.3s}
        
        #cam-indicator{position:absolute;top:80px;right:16px;background:rgba(255,255,255,0.85);border:1px solid rgba(0,0,0,0.1);border-radius:6px;padding:6px 12px;color:#666;font-size:11px}
        
        #start-screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg, #87ceeb 0%, #a0a0a0 100%);z-index:100}
        #start-screen h1{color:#333;font-size:48px;font-weight:700;letter-spacing:4px;margin-bottom:8px}
        #start-screen h2{color:#666;font-size:16px;letter-spacing:2px;margin-bottom:32px}
        #start-btn{padding:14px 40px;font-size:18px;font-weight:600;color:#fff;background:#333;border:none;border-radius:8px;cursor:pointer;transition:all 0.2s;letter-spacing:1px}
        #start-btn:hover{background:#555;transform:scale(1.02)}
        #loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#555;font-size:13px;text-align:center;z-index:1;display:none}
        .loader{width:32px;height:32px;border:3px solid rgba(0,0,0,0.1);border-top-color:#333;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        #controls{position:absolute;bottom:24px;right:24px;background:rgba(255,255,255,0.85);border:1px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px 16px;max-width:220px;backdrop-filter:blur(6px)}
        #controls h3{color:#333;font-size:11px;font-weight:600;margin-bottom:6px}
        #controls p{color:#555;font-size:11px;margin:3px 0;line-height:1.4}
        .key{display:inline-block;background:rgba(0,0,0,0.06);padding:1px 5px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);margin:0 2px;font-weight:600;font-size:10px}
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>CITY RUNNING</h1>
        <h2>在城市中奔跑</h2>
        <button id="start-btn">开始奔跑</button>
        <div id="loading"><div class="loader"></div><p>加载中...</p></div>
    </div>
    <div id="canvas-container"></div>
    <div id="hud">
        <div id="score-panel"><h3>分数</h3><div><span id="score-value">0</span></div></div>
        <div id="speed-panel"><h3>速度</h3><div><span id="speed-value">0</span><span id="speed-unit"> km/h</span></div></div>
        <div id="jump-hint">按 SPACE 跳跃</div>
        <div id="cam-indicator">追尾视角</div>
        <div id="controls">
            <h3>控制</h3>
            <p><span class="key">A</span>/<span class="key">←</span> 左移 <span class="key">D</span>/<span class="key">→</span> 右移</p>
            <p><span class="key">SPACE</span>/<span class="key">↑</span> 跳跃</p>
            <p><span class="key">R</span> 重置 <span class="key">C</span> 相机</p>
        </div>
    </div>
    <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"}}
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
