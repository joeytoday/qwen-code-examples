<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克城市飞行器 - Cyberpunk City Flight</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #0a0a0f;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f3ff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px #00f3ff, 0 0 40px #00f3ff;
            letter-spacing: 2px;
        }

        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid rgba(0, 243, 255, 0.5);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3), inset 0 0 20px rgba(0, 243, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        #controls-hint h3 {
            color: #ff00aa;
            margin-bottom: 12px;
            font-size: 18px;
            text-shadow: 0 0 10px #ff00aa;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #controls-hint p {
            margin: 6px 0;
            line-height: 1.6;
        }

        .key {
            display: inline-block;
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.3), rgba(0, 243, 255, 0.1));
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #00f3ff;
            margin: 0 4px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            font-weight: bold;
        }

        #collect-feedback {
            position: absolute;
            color: #ff00aa;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff00aa, 0 0 40px #ff00aa;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00f3ff;
            font-size: 24px;
            text-align: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 243, 255, 0.2);
            border-top-color: #00f3ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1f 50%, #0a0a0f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        #start-screen h1 {
            color: #00f3ff;
            font-size: 64px;
            text-shadow: 0 0 30px #00f3ff, 0 0 60px #00f3ff;
            margin-bottom: 20px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        #start-screen h2 {
            color: #ff00aa;
            font-size: 24px;
            text-shadow: 0 0 20px #ff00aa;
            margin-bottom: 60px;
            letter-spacing: 4px;
        }

        #start-btn {
            padding: 20px 60px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #0a0a0f;
            background: linear-gradient(180deg, #00f3ff, #00a8ff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.8), 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 243, 255, 1), 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        #start-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>CYBERPUNK CITY</h1>
        <h2>赛博朋克城市飞行器</h2>
        <button id="start-btn">开始飞行 / START FLIGHT</button>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer" style="display: none;">
        <div id="score-display">能量球：<span id="score">0</span></div>
        <div id="controls-hint">
            <h3>操控说明</h3>
            <p><span class="key">W</span> / <span class="key">↑</span> 向前飞行</p>
            <p><span class="key">S</span> / <span class="key">↓</span> 向后飞行</p>
            <p><span class="key">A</span> / <span class="key">←</span> 向左平移</p>
            <p><span class="key">D</span> / <span class="key">→</span> 向右平移</p>
            <p><span class="key">SPACE</span> 上升</p>
            <p><span class="key">SHIFT</span> 加速</p>
            <p><span class="key">MOUSE</span> 旋转视角</p>
        </div>
        <div id="collect-feedback">+1</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script>
        // ==================== GAME STATE ====================
        let gameStarted = false;
        let score = 0;
        
        // ==================== PLAYER ====================
        let player = {
            x: 0,
            y: 50,
            z: 0,
            vx: 0,
            vy: 0,
            vz: 0,
            speed: 0.5,
            maxSpeed: 1.5,
            acceleration: 0.03,
            friction: 0.96,
            rotX: 0,
            rotY: 0
        };
        
        // ==================== CITY ====================
        let buildings = [];
        const citySize = 800;
        const buildingCount = 50;
        
        // ==================== COLLECTIBLES ====================
        let collectibles = [];
        const collectibleCount = 30;
        
        // ==================== INPUT ====================
        let keys = {};
        let mouseXRelative = 0;
        let mouseYRelative = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let mouseLocked = false;
        
        // ==================== SETUP ====================
        function setup() {
            const container = document.getElementById('canvas-container');
            const canvas = createCanvas(container.offsetWidth, container.offsetHeight, WEBGL);
            canvas.parent('canvas-container');
            
            // Initialize buildings
            generateCity();
            
            // Initialize collectibles
            for (let i = 0; i < collectibleCount; i++) {
                spawnCollectible();
            }
            
            // Input handling
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Escape' && mouseLocked) {
                    document.exitPointerLock();
                }
            });
            
            document.addEventListener('keyup', (e) => {
                keys[e.code] = false;
            });
            
            document.addEventListener('mousemove', (e) => {
                if (mouseLocked && gameStarted) {
                    mouseXRelative += e.movementX * 0.002;
                    mouseYRelative += e.movementY * 0.002;
                    mouseYRelative = constrain(mouseYRelative, -0.5, 0.5);
                }
            });
            
            document.addEventListener('pointerlockchange', () => {
                mouseLocked = document.pointerLockElement === canvas.elt;
            });
            
            // Start button
            document.getElementById('start-btn').addEventListener('click', () => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('ui-layer').style.display = 'block';
                gameStarted = true;
                canvas.elt.requestPointerLock();
            });
            
            // Window resize
            window.addEventListener('resize', () => {
                resizeCanvas(container.offsetWidth, container.offsetHeight);
            });
        }
        
        // ==================== CITY GENERATION ====================
        function generateCity() {
            for (let i = 0; i < buildingCount; i++) {
                let x, z;
                do {
                    x = random(-citySize/2, citySize/2);
                    z = random(-citySize/2, citySize/2);
                } while (abs(x) < 30 && abs(z) < 30);
                
                let width = random(15, 40);
                let depth = random(15, 40);
                let height = random(40, 200);
                
                let colorChoice = floor(random(3));
                let neonColor;
                if (colorChoice === 0) neonColor = color(0, 243, 255);   // Cyan
                else if (colorChoice === 1) neonColor = color(255, 0, 170); // Pink
                else neonColor = color(170, 0, 255); // Purple
                
                buildings.push({
                    x: x,
                    y: height / 2,
                    z: z,
                    width: width,
                    depth: depth,
                    height: height,
                    neonColor: neonColor,
                    windows: generateWindows(width, height, depth)
                });
            }
        }
        
        function generateWindows(w, h, d) {
            let windows = [];
            let numWindows = floor(random(5, 15));
            for (let i = 0; i < numWindows; i++) {
                let face = floor(random(4));
                let wx = random(-w/2 + 2, w/2 - 2);
                let wy = random(-h/2 + 5, h/2 - 5);
                let wz = random(-d/2 + 2, d/2 - 2);
                let winColor = random() > 0.7 ? color(255, 255, 0) : color(0, 255, 255);
                windows.push({ face, wx, wy, wz, color: winColor });
            }
            return windows;
        }
        
        // ==================== COLLECTIBLES ====================
        function spawnCollectible() {
            collectibles.push({
                x: random(-citySize/2 + 50, citySize/2 - 50),
                y: random(10, 150),
                z: random(-citySize/2 + 50, citySize/2 - 50),
                color: random() > 0.5 ? color(255, 215, 0) : color(0, 243, 255),
                rotation: random(TWO_PI),
                pulseOffset: random(TWO_PI)
            });
        }
        
        // ==================== UPDATE ====================
        function update() {
            if (!gameStarted) return;
            
            // Player movement
            let currentMaxSpeed = keys['ShiftLeft'] || keys['ShiftRight'] ? player.maxSpeed * 1.5 : player.maxSpeed;
            
            if (keys['ArrowUp'] || keys['KeyW']) player.vz -= player.acceleration;
            if (keys['ArrowDown'] || keys['KeyS']) player.vz += player.acceleration;
            if (keys['ArrowLeft'] || keys['KeyA']) player.vx -= player.acceleration;
            if (keys['ArrowRight'] || keys['KeyD']) player.vx += player.acceleration;
            if (keys['Space']) player.vy += player.acceleration * 1.5;
            if (keys['ControlLeft'] || keys['ControlRight']) player.vy -= player.acceleration * 1.5;
            
            // Apply friction
            player.vx *= player.friction;
            player.vy *= player.friction;
            player.vz *= player.friction;
            
            // Limit speed
            player.vx = constrain(player.vx, -currentMaxSpeed, currentMaxSpeed);
            player.vz = constrain(player.vz, -currentMaxSpeed, currentMaxSpeed);
            player.vy = constrain(player.vy, -currentMaxSpeed * 0.5, currentMaxSpeed * 0.5);
            
            // Update position
            player.x += player.vx;
            player.y += player.vy;
            player.z += player.vz;
            
            // Boundaries
            let boundary = citySize/2 - 20;
            player.x = constrain(player.x, -boundary, boundary);
            player.z = constrain(player.z, -boundary, boundary);
            player.y = constrain(player.y, 5, 250);
            
            // Rotation from mouse
            player.rotY = mouseXRelative;
            player.rotX = mouseYRelative;
            
            // Update collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let c = collectibles[i];
                c.rotation += 0.02;
                
                let d = dist(player.x, player.y, player.z, c.x, c.y, c.z);
                if (d < 8) {
                    collectibles.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                    showFeedback();
                    setTimeout(() => spawnCollectible(), 2000);
                }
            }
        }
        
        function showFeedback() {
            let fb = document.getElementById('collect-feedback');
            fb.style.left = '50%';
            fb.style.top = '40%';
            fb.style.opacity = '1';
            setTimeout(() => { fb.style.opacity = '0'; }, 500);
        }
        
        // ==================== DRAW ====================
        function draw() {
            update();
            
            // Background
            background(10, 10, 15);
            
            // Camera follow player
            let camDist = 80;
            let camHeight = 40;
            let targetX = player.x - sin(player.rotY) * camDist;
            let targetZ = player.z - cos(player.rotY) * camDist;
            let targetY = player.y + camHeight + player.rotX * 50;
            
            camera(targetX, targetY, targetZ,
                   player.x, player.y, player.z,
                   0, 1, 0);
            
            // Ambient light
            ambientLight(40);
            
            // Directional light (moon)
            directionalLight(170, 170, 255, 0.6, 100, 200, 100);
            
            // Colored point lights
            pointLight(0, 243, 255, 100, 50, 100);
            pointLight(255, 0, 170, -100, 50, -100);
            
            // Fog for depth
            setFog(10, 10, 15, 200, 600);
            
            // Draw ground grid
            drawGround();
            
            // Draw buildings
            for (let b of buildings) {
                drawBuilding(b);
            }
            
            // Draw collectibles
            for (let c of collectibles) {
                drawCollectible(c);
            }
            
            // Draw player
            drawPlayer();
            
            // Disable fog for UI elements
            noFog();
        }
        
        function drawGround() {
            push();
            rotateX(HALF_PI);
            
            // Grid
            stroke(0, 243, 255, 100);
            strokeWeight(1);
            noFill();
            
            let gridSize = 20;
            let gridRange = citySize / 2;
            
            for (let i = -gridRange; i <= gridRange; i += gridSize) {
                beginShape();
                vertex(-gridRange, i);
                vertex(gridRange, i);
                endShape();
                
                beginShape();
                vertex(i, -gridRange);
                vertex(i, gridRange);
                endShape();
            }
            
            // Ground plane with gradient effect
            noStroke();
            for (let i = 0; i < 5; i++) {
                fill(13, 13, 18, 200 - i * 30);
                let size = citySize - i * 50;
                plane(size, size);
            }
            
            pop();
        }
        
        function drawBuilding(b) {
            push();
            translate(b.x, b.y, b.z);
            
            // Building body
            noStroke();
            fill(26, 26, 46);
            box(b.width, b.height, b.depth);
            
            // Neon edges
            stroke(b.neonColor);
            strokeWeight(2);
            noFill();
            
            // Draw wireframe edges
            push();
            translate(0, 0, 0);
            let hw = b.width / 2;
            let hh = b.height / 2;
            let hd = b.depth / 2;
            
            // Top rectangle
            beginShape();
            vertex(-hw, -hh, -hd);
            vertex(hw, -hh, -hd);
            vertex(hw, -hh, hd);
            vertex(-hw, -hh, hd);
            endShape(CLOSE);
            
            // Bottom rectangle
            beginShape();
            vertex(-hw, hh, -hd);
            vertex(hw, hh, -hd);
            vertex(hw, hh, hd);
            vertex(-hw, hh, hd);
            endShape(CLOSE);
            
            // Vertical edges
            line(-hw, -hh, -hd, -hw, hh, -hd);
            line(hw, -hh, -hd, hw, hh, -hd);
            line(hw, -hh, hd, hw, hh, hd);
            line(-hw, -hh, hd, -hw, hh, hd);
            pop();
            
            // Windows
            for (let w of b.windows) {
                push();
                fill(w.color);
                emissiveMaterial(w.color);
                noStroke();
                
                if (w.face === 0) { // Front
                    translate(w.wx, w.wy, hd + 0.5);
                    plane(2, 3);
                } else if (w.face === 1) { // Back
                    translate(w.wx, w.wy, -hd - 0.5);
                    rotateY(PI);
                    plane(2, 3);
                } else if (w.face === 2) { // Left
                    translate(-hw - 0.5, w.wy, w.wz);
                    rotateY(HALF_PI);
                    plane(2, 3);
                } else { // Right
                    translate(hw + 0.5, w.wy, w.wz);
                    rotateY(-HALF_PI);
                    plane(2, 3);
                }
                pop();
            }
            
            pop();
        }
        
        function drawCollectible(c) {
            push();
            translate(c.x, c.y, c.z);
            rotateY(c.rotation);
            rotateZ(c.rotation * 0.5);
            
            let pulse = 1 + sin(frameCount * 0.05 + c.pulseOffset) * 0.1;
            scale(pulse);
            
            // Outer glow
            noStroke();
            fill(red(c.color), green(c.color), blue(c.color), 50);
            emissiveMaterial(c.color);
            sphere(4);
            
            // Inner core
            fill(255, 255, 255);
            emissiveMaterial(255, 255, 255);
            sphere(2);
            
            // Orbiting particles
            for (let i = 0; i < 6; i++) {
                let angle = c.rotation + (i / 6) * TWO_PI;
                let px = cos(angle) * 5;
                let py = sin(angle) * 5;
                fill(255, 255, 255, 200);
                noStroke();
                sphere(0.5);
            }
            
            pop();
        }
        
        function drawPlayer() {
            push();
            translate(player.x, player.y, player.z);
            rotateY(player.rotY);
            rotateX(player.rotX);
            
            // Tilt based on velocity
            rotateZ(-player.vx * 0.3);
            rotateX(player.vz * 0.1);
            
            // Player light
            pointLight(0, 243, 255, 0, 0, 0);
            
            // Main body (cone)
            noStroke();
            fill(34, 34, 34);
            emissiveMaterial(0, 243, 255, 100);
            push();
            rotateX(HALF_PI);
            cone(2, 6, 8);
            pop();
            
            // Wings
            fill(0, 243, 255, 200);
            emissiveMaterial(0, 243, 255, 200);
            
            // Left wing
            push();
            beginShape();
            vertex(0, 0, 0);
            vertex(-8, 0, 3);
            vertex(-8, 0, -2);
            endShape(CLOSE);
            pop();
            
            // Right wing
            push();
            beginShape();
            vertex(0, 0, 0);
            vertex(8, 0, 3);
            vertex(8, 0, -2);
            endShape(CLOSE);
            pop();
            
            // Thruster glow
            fill(255, 0, 170, 150);
            emissiveMaterial(255, 0, 170, 150);
            push();
            translate(0, 0, 4);
            sphere(1.5);
            pop();
            
            // Thruster particles
            if (abs(player.vx) > 0.1 || abs(player.vz) > 0.1) {
                for (let i = 0; i < 5; i++) {
                    let offset = i * 2 + frameCount % 10 * 0.5;
                    fill(0, 243, 255, 150 - i * 20);
                    noStroke();
                    push();
                    translate(0, 0, 4 + offset);
                    scale(1 - i * 0.15);
                    sphere(0.5);
                    pop();
                }
            }
            
            pop();
        }
    </script>
</body>
</html>
