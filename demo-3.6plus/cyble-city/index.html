<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克城市飞行器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background-color: #0a0a0f;
            font-family: 'Courier New', monospace;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f3ff;
            font-size: 24px;
            text-shadow: 0 0 10px #00f3ff;
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }
        
        #controls-hint h3 {
            color: #ff00aa;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        #controls-hint p {
            margin: 4px 0;
        }
        
        .key {
            display: inline-block;
            background: rgba(0, 243, 255, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #00f3ff;
            margin: 0 2px;
        }
        
        #collect-feedback {
            position: absolute;
            color: #ff00aa;
            font-size: 20px;
            text-shadow: 0 0 10px #ff00aa;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="score-display">能量球：<span id="score">0</span></div>
        <div id="controls-hint">
            <h3>操控说明</h3>
            <p><span class="key">↑</span> 向前飞行</p>
            <p><span class="key">↓</span> 向后飞行</p>
            <p><span class="key">←</span> 向左平移</p>
            <p><span class="key">→</span> 向右平移</p>
            <p><span class="key">Shift</span> 加速</p>
        </div>
        <div id="collect-feedback">+1</div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r150/three.min.js"></script>
    <script>
        // ==================== SCENE MANAGER ====================
        class SceneManager {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.init();
            }
            
            init() {
                // 创建场景
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x0a0a0f);
                this.scene.fog = new THREE.FogExp2(0x0a0a0f, 0.015);
                
                // 创建相机
                this.camera = new THREE.PerspectiveCamera(
                    75,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                this.camera.position.set(0, 10, 20);
                
                // 创建渲染器
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                
                // 添加到 DOM
                const container = document.getElementById('canvas-container');
                container.appendChild(this.renderer.domElement);
                
                // 添加灯光
                this.addLights();
                
                // 窗口大小调整
                window.addEventListener('resize', () => this.onResize());
            }
            
            addLights() {
                // 环境光
                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                this.scene.add(ambientLight);
                
                // 主方向光（模拟月光）
                const directionalLight = new THREE.DirectionalLight(0xaaccff, 0.8);
                directionalLight.position.set(50, 100, 50);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                directionalLight.shadow.camera.near = 0.5;
                directionalLight.shadow.camera.far = 500;
                directionalLight.shadow.camera.left = -100;
                directionalLight.shadow.camera.right = 100;
                directionalLight.shadow.camera.top = 100;
                directionalLight.shadow.camera.bottom = -100;
                this.scene.add(directionalLight);
                
                // 青色补光
                const cyanLight = new THREE.PointLight(0x00f3ff, 0.5, 100);
                cyanLight.position.set(-30, 20, -30);
                this.scene.add(cyanLight);
                
                // 粉色补光
                const pinkLight = new THREE.PointLight(0xff00aa, 0.5, 100);
                pinkLight.position.set(30, 20, 30);
                this.scene.add(pinkLight);
            }
            
            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            render() {
                this.renderer.render(this.scene, this.camera);
            }
        }
        
        // ==================== GAME INITIALIZATION ====================
        const sceneManager = new SceneManager();
    </script>
</body>
</html>
